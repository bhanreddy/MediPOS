name: Mobile OTA Update

on:
  push:
    branches: [main]
    paths:
      - 'Medical POS ReactNative/**'
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS Update Channel'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

defaults:
  run:
    working-directory: ./Medical POS ReactNative

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './Medical POS ReactNative/package-lock.json'

      - run: npm ci
      - run: npx tsc --noEmit

  ota-update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './Medical POS ReactNative/package-lock.json'

      - run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push Update
        run: eas update --branch ${{ github.event.inputs.channel || 'production' }} --message "Auto deploy $(git rev-parse --short HEAD)"

  native-build:
    name: Native Build (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './Medical POS ReactNative/package-lock.json'

      - run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile production --non-interactive
