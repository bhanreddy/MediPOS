name: Web Dashboard CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'Medical POS Reactjs/**'
  pull_request:
    branches: [main]
    paths:
      - 'Medical POS Reactjs/**'

defaults:
  run:
    working-directory: ./Medical POS Reactjs

jobs:
  typecheck-and-build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './Medical POS Reactjs/package-lock.json'

      - run: npm ci
      - run: npx tsc -b
      - run: npm run build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel Config
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
